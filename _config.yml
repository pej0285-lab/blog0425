theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: My Blog
tagline: GitHub Pages, PowerPoint, and practical tutorials
description: >-
  GitHub Pages 블로그 운영과 PowerPoint 튜토리얼을 정리하는 기술 블로그입니다.

url: "https://pej0285-lab.github.io"
baseurl: "/blog0425"

github:
  username: pej0285-lab

social:
  name: My Blog
  email:
  links:
    - https://github.com/pej0285-lab

theme_mode: dark
toc: true

comments:
  provider:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - "애니메이션 만들기.docx"
  - "~$메이션 만들기.docx"

jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/
